<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Upload Paper</title>

    <!-- ✅ CSS MUST BE HERE -->
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="container">
    <div class="card">

        <h1>Upload Paper (B.Tech)</h1>
        <p>Select subject, year and upload PDF</p>

        <!-- ✅ ONLY ONE FORM -->
        <form method="POST" enctype="multipart/form-data" class="upload-form">

            <!-- Semester -->
            <select name="semester" required>
                <option value="">Select Semester</option>
                {% for i in range(1,9) %}
                <option value="{{ i }}"
                {% if selected_sem == i|string %}selected{% endif %}>
                    Sem {{ i }}
                </option>
                {% endfor %}
            </select>

            <!-- Load Subjects -->
            <button type="submit" name="action" value="load" formnovalidate class="btn student">
                Load Subjects
            </button>

            <!-- Subject -->
            <select name="subject">
                <option value="">Select Subject</option>
                {% for sub in subjects %}
                <option value="{{ sub }}">{{ sub }}</option>
                {% endfor %}
            </select>

            <!-- Year -->
            <input type="number" name="year" placeholder="Year" required>

            <!-- File -->
            <input type="file" name="file" required>

            <!-- Upload -->
            <button type="submit" name="action" value="upload" class="btn teacher">
                Upload
            </button>

        </form>

        <div class="back-link">
            <a href="{{ url_for('home') }}">← Back</a>
        </div>

    </div>
</div>

</body>
</html>
